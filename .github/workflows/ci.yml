name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Backend — Java ${{ matrix.java-version }} (Spring Boot)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: ["17", "21"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: Build & Test (Maven)
        run: |
          if [ -f backend/pom.xml ]; then
            cd backend && mvn --batch-mode --no-transfer-progress verify
          else
            echo "backend/pom.xml not found — skipping"
          fi

  frontend:
    name: Frontend — Node.js ${{ matrix.node-version }} (Angular)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["18.x", "20.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm ci --prefer-offline
          else
            echo "frontend/package.json not found — skipping"
          fi

      - name: Lint
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run lint --if-present
          fi

      - name: Test
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run test --if-present -- --ci --no-progress --browsers=ChromeHeadless
          fi

      - name: Build
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run build --if-present
          fi
